mode: quick
topic: ""

backend:
  orchestrator: claude-sonnet-4-6
  coding_workers:
    provider: claude
    model: claude-sonnet-4-6
    max_workers: 1
    task_types:
      - code_generation
      - data_analysis
      - plotting

literature:
  max_papers: 20
  sources:
    - arxiv
    - semantic_scholar
  geo_query_expansion: true
  recency_weight: 0.3

experiment:
  max_iterations: 2
  sandbox_timeout_sec: 300
  auto_install_packages: false
  save_intermediate: true

writing:
  temperature: 0.7
  journal: IJGIS
  output_format: markdown
  review_rounds: 1

output:
  base_dir: output
  checkpoint_dir: .checkpoints
  log_dir: harness/logs
  save_intermediate: true
